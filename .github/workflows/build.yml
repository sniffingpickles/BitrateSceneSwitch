name: Build OBS Plugin

on:
  push:
    branches: [main, master]
    tags: ['*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  PLUGIN_NAME: BitrateSceneSwitch

jobs:
  build-windows:
    name: Build for Windows ${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            cmake_arch: x64
            msvc_arch: x64
            qt_arch: win64_msvc2019_64
            curl_url: "https://curl.se/windows/latest.cgi?p=win64-mingw.zip"
          - arch: arm64
            cmake_arch: ARM64
            msvc_arch: amd64_arm64
            qt_arch: win64_msvc2019_arm64
            curl_url: "https://curl.se/windows/latest.cgi?p=win64a-mingw.zip"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Install Qt (host tools for cross-compile)
        if: matrix.arch == 'arm64'
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          set-env: false
          cache: true
          cache-key-prefix: qt-host

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.2'
          host: 'windows'
          target: 'desktop'
          arch: ${{ matrix.qt_arch }}
          cache: true

      - name: Cache OBS Studio source
        id: cache-obs
        uses: actions/cache@v4
        with:
          path: obs-studio
          key: obs-studio-${{ matrix.obs_version }}-${{ matrix.arch }}

      - name: Clone OBS Studio
        if: steps.cache-obs.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          git clone --depth 1 --branch 31.0.0 https://github.com/obsproject/obs-studio.git obs-studio
          cd obs-studio
          git submodule update --init --recursive --depth 1
          cd ..

      - name: Cache OBS deps
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: obs-deps
          key: obs-deps-2025-08-23-x64

      - name: Download OBS deps
        if: steps.cache-deps.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $depsUrl = "https://github.com/obsproject/obs-deps/releases/download/2025-08-23/windows-deps-2025-08-23-x64.zip"
          Invoke-WebRequest -Uri $depsUrl -OutFile deps.zip
          Expand-Archive deps.zip -DestinationPath obs-deps

      - name: Cache CURL
        id: cache-curl
        uses: actions/cache@v4
        with:
          path: curl
          key: curl-latest-${{ matrix.arch }}

      - name: Download pre-built CURL
        if: steps.cache-curl.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "${{ matrix.curl_url }}" -OutFile curl.zip
          Expand-Archive curl.zip -DestinationPath curl-download
          Move-Item curl-download/curl-* curl

      - name: Cache OBS build
        id: cache-obs-build
        uses: actions/cache@v4
        with:
          path: obs-studio/build-x64
          key: obs-build-31.0.0-msvc-release-x64

      - name: Build OBS Libraries (x64)
        if: steps.cache-obs-build.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          cd obs-studio
          cmake -B build-x64 -S . -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DENABLE_BROWSER=OFF `
            -DENABLE_SCRIPTING=OFF `
            -DENABLE_UI=ON `
            -DENABLE_PLUGINS=OFF `
            -DENABLE_VIRTUALCAM=OFF `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/obs-deps"
          cmake --build build-x64 --config Release --target libobs obs-frontend-api -- /m
          cd ..

      - name: Generate ARM64 import libs
        if: matrix.arch == 'arm64'
        shell: pwsh
        run: |
          # OBS 31.0 cant build for ARM64, but the plugin ABI is
          # stable. we take the x64-built .lib files, dump their
          # exports to .def, then regenerate import libs for ARM64
          New-Item -ItemType Directory -Force -Path obs-studio/build-arm64/libobs/Release
          New-Item -ItemType Directory -Force -Path obs-studio/build-arm64/UI/obs-frontend-api/Release
          New-Item -ItemType Directory -Force -Path obs-studio/build-arm64/deps/w32-pthreads/Release

          foreach ($lib in @(
            @{src="build-x64/libobs/Release/obs.lib"; dst="build-arm64/libobs/Release/obs.lib"; name="obs"},
            @{src="build-x64/UI/obs-frontend-api/Release/obs-frontend-api.lib"; dst="build-arm64/UI/obs-frontend-api/Release/obs-frontend-api.lib"; name="obs-frontend-api"},
            @{src="build-x64/deps/w32-pthreads/Release/w32-pthreads.lib"; dst="build-arm64/deps/w32-pthreads/Release/w32-pthreads.lib"; name="w32-pthreads"}
          )) {
            $defFile = "$($lib.name).def"
            # dump public symbols from the x64 lib and filter to
            # actual function/data exports (skip section names, debug
            # symbols, and internal linker junk)
            $symbols = & dumpbin /LINKERMEMBER:1 "obs-studio/$($lib.src)" |
              Select-String "^\s+[0-9A-F]+\s+(\S+)$" |
              ForEach-Object { $_.Matches.Groups[1].Value } |
              Where-Object { $_ -notmatch '^\.' -and $_ -notmatch '^\$' -and $_ -notmatch '__real@' -and $_ -notmatch '__NULL_IMPORT' } |
              Sort-Object -Unique
            (@("EXPORTS") + ($symbols | ForEach-Object { "  $_" })) | Set-Content $defFile
            & lib /DEF:$defFile /OUT:"obs-studio/$($lib.dst)" /MACHINE:ARM64 /NOLOGO
            Remove-Item $defFile
          }

      - name: Configure Plugin
        shell: pwsh
        run: |
          $obsDir = "${{ github.workspace }}/obs-studio"
          $curlDir = "${{ github.workspace }}/curl"
          $obsBuildDir = "$obsDir/build-${{ matrix.arch }}"
          $cmakeArgs = @(
            "-B", "build", "-S", ".", "-G", "Visual Studio 17 2022", "-A", "${{ matrix.cmake_arch }}",
            "-DCMAKE_BUILD_TYPE=Release",
            "-DCMAKE_PREFIX_PATH=${{ env.Qt6_DIR }};${{ github.workspace }}/obs-deps;$obsBuildDir",
            "-Dlibobs_DIR=$obsBuildDir/libobs",
            "-Dobs-frontend-api_DIR=$obsBuildDir/UI/obs-frontend-api",
            "-Dw32-pthreads_DIR=$obsBuildDir/deps/w32-pthreads",
            "-DCURL_INCLUDE_DIR=$curlDir/include",
            "-DCURL_LIBRARY=$curlDir/lib/libcurl.dll.a"
          )
          if ("${{ matrix.arch }}" -eq "arm64") {
            $hostQt = "${{ env.Qt6_DIR }}" -replace "msvc2019_arm64", "msvc2019_64"
            $cmakeArgs += "-DQT_HOST_PATH=$hostQt"
            # the cmake config files from the x64 build have hardcoded
            # x64 paths. copy them and rewrite to point at our arm64 libs
            # copy cmake package files next to our arm64 .libs, but only
            # rewrite paths to Release/*.lib. includes and generated config
            # stay on build-x64 or they point at dirs we never created.
            foreach ($dir in @("libobs", "UI/obs-frontend-api", "deps/w32-pthreads")) {
              $srcDir = "$obsDir/build-x64/$dir"
              Get-ChildItem "$srcDir" -Filter "*.cmake" -Recurse -ErrorAction SilentlyContinue | ForEach-Object {
                $destPath = $_.FullName -replace "build-x64", "build-arm64"
                $content = Get-Content $_.FullName -Raw
                $content = $content -replace "build-x64/libobs/Release", "build-arm64/libobs/Release"
                $content = $content -replace "build-x64\\libobs\\Release", "build-arm64\\libobs\\Release"
                $content = $content -replace "build-x64/UI/obs-frontend-api/Release", "build-arm64/UI/obs-frontend-api/Release"
                $content = $content -replace "build-x64\\UI\\obs-frontend-api\\Release", "build-arm64\\UI\\obs-frontend-api\\Release"
                $content = $content -replace "build-x64/deps/w32-pthreads/Release", "build-arm64/deps/w32-pthreads/Release"
                $content = $content -replace "build-x64\\deps\\w32-pthreads\\Release", "build-arm64\\deps\\w32-pthreads\\Release"
                New-Item -ItemType Directory -Force -Path (Split-Path $destPath) | Out-Null
                Set-Content $destPath $content
              }
            }
          }
          cmake @cmakeArgs

      - name: Build Plugin
        run: cmake --build build --config Release

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "release/obs-plugins/64bit"
          New-Item -ItemType Directory -Force -Path "release/data/obs-plugins/${{ env.PLUGIN_NAME }}"

          $dllPath = "build/Release/${{ env.PLUGIN_NAME }}.dll"
          if (Test-Path $dllPath) {
            Copy-Item $dllPath "release/obs-plugins/64bit/"
          } else {
            Write-Host "DLL not found at $dllPath, searching..."
            Get-ChildItem -Path build -Recurse -Filter "*.dll" | ForEach-Object { Write-Host $_.FullName }
          }

          # Find and copy the curl DLL (name varies by arch)
          $curlDll = Get-ChildItem -Path "curl/bin" -Filter "*.dll" | Select-Object -First 1
          if ($curlDll) {
            Copy-Item $curlDll.FullName "release/obs-plugins/64bit/"
          }

          if (Test-Path "data") {
            Copy-Item -Recurse "data/*" "release/data/obs-plugins/${{ env.PLUGIN_NAME }}/"
          }

      - name: Build Installer
        if: matrix.arch == 'x64'
        shell: pwsh
        run: |
          $version = (Select-String -Path CMakeLists.txt -Pattern 'project\(.+ VERSION (.+)\)').Matches.Groups[1].Value
          choco install nsis -y --no-progress
          & "C:\Program Files (x86)\NSIS\makensis.exe" /DPLUGIN_VERSION=$version installer.nsi

      - name: Upload Artifact (zip)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-windows-${{ matrix.arch }}
          path: release/

      - name: Upload Artifact (installer)
        if: matrix.arch == 'x64'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-windows-x64-setup
          path: ${{ env.PLUGIN_NAME }}-*-setup.exe

  release:
    name: Create Release
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release Archives
        run: |
          cd artifacts/${{ env.PLUGIN_NAME }}-windows-x64
          zip -r ../../${{ env.PLUGIN_NAME }}-${{ github.ref_name }}-windows-x64.zip .
          cd ../..
          cd artifacts/${{ env.PLUGIN_NAME }}-windows-arm64
          zip -r ../../${{ env.PLUGIN_NAME }}-${{ github.ref_name }}-windows-arm64.zip .

      - name: Stage Installer
        run: |
          cp artifacts/${{ env.PLUGIN_NAME }}-windows-x64-setup/*.exe .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.PLUGIN_NAME }}-${{ github.ref_name }}-windows-x64.zip
            ${{ env.PLUGIN_NAME }}-${{ github.ref_name }}-windows-arm64.zip
            ${{ env.PLUGIN_NAME }}-*-setup.exe
          draft: false
          prerelease: false
